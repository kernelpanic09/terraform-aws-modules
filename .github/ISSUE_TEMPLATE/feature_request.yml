name: Feature request
description: Suggest a new module or improvement to an existing one
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to add or change?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case / why
      description: What problem does this solve? What AWS pattern or integration are you trying to cover?
    validations:
      required: false
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: Any thoughts on how the module interface should look? (optional)
    validations:
      required: false
